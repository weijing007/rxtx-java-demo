<script type="text/javascript" src="/js/jquery.min.js"></script>
<script type="text/javascript" src="/js/echarts.min.js"></script>
<script type="text/javascript" src="/js/select2.min.js"></script>
<link rel="stylesheet" href="/css/select2.min.css" />

	<style>
	.body {
		width: 100%;

	}
	
	.topbar {
		width: 99%;
		height: 30px;
		vertical-align: middle;
	}
	
	.box {
		width: 99%;

		border: 1px solid cornflowerblue;
		text-align: center;

	}
	
	.button {
		width: 100px;

		font-size: 28px;
		font-weight: bold;

<body class="body">
<!-- ... 邮件正文内容（表格、问候语等）保持不变 ... -->
<p style="text-align: center;font-size: 28px">串口继电器控制系统</p>
<!-- ✅ 移除 type="submit"，改用 button 避免隐式提交；添加 data-action 属性便于复用 -->
<form id="decline-form" class="box">
    <button id="submit-open" type="button" class="button" data-action="/jSerialComm/open">打开</button>
    <button id="submit-close" type="button" class="button" data-action="/jSerialComm/close">关闭</button>
    <label id="opencloseText" class = "textmessage"></label>
    <br>
    <button id="submit-diandong" type="button"  class="button" data-action="/jSerialComm/openDD">点动</button>
     <label id="diandongText" class = "textmessage"></label>
    <br>
    <button id="submit-open3sec" type="button"  class="button" data-action="/jSerialComm/openTime?time=1">打开3秒</button>
     <label id="open3secText" class = "textmessage"></label>
     <br>
     <button id="submit-open2" type="button"  class="button" data-action="/jSerialComm/open2">打开</button>
     <button id="submit-close2" type="button"  class="button" data-action="/jSerialComm/close2">关闭</button>
     
     <!-- <button id="submit-open2" type="button"  class="button" data-action="/rxtx/open">打开</button>
     <button id="submit-close2" type="button"  class="button" data-action="/rxtx/close">关闭</button>
     <button id="submit-open2" type="button"  class="button" data-action="/nettyRxtx/open">打开</button>
     <button id="submit-close2" type="button"  class="button" data-action="/nettyRxtx/close">关闭</button> -->

     <label id="openclose2Text" class = "textmessage"></label>
     
</form>
<p>
    <span>Regards,weijin workspace Team</span><br/>
</p>
<!-- ✅ 使用 document.ready 确保 DOM 加载完成后再绑定事件 -->
<script>
$(document).ready(function() {
    $('#submit-open').on('click', function(e) {
        e.preventDefault(); // ? 必须！阻止任何默认行为
        const actionUrl = $(this).data('action');
        const fullUrl = actionUrl; // ⚠️ 生产环境请替换为真实域名（且需 CORS 配置）
        $('#opencloseText').text('');
        $.ajax({
            url: fullUrl,
            type: 'GET',
            dataType: 'text', // 后端返回 String 类型时推荐
            timeout: 10000,
            success: function(response) {
                console.log('✅ Decline request succeeded:', response);
                // ✅ 可选：更新按钮状态或显示确认提示（仅限支持 JS 的客户端）
                $('#submit-open').prop('disabled', true);
                $('#submit-close').prop('disabled', false);
                if(response > 0 ){
                	 $('#opencloseText').text('打开成功!').css('color', 'black');
                }else{
                	 $('#opencloseText').text('打开失败!').css('color', 'red');
                }
            },
            error: function(xhr, status, error) {
                console.error('❌ Request failed:', status, error);
            }
        });
    });
});
